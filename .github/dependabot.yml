version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      astro-and-friends:
        patterns: ["astro", "@astrojs/*"]
      react-and-friends:
        patterns: ["react", "react-dom", "@types/react*"]
      three-js:
        patterns: ["three", "@react-three/*", "@types/three"]
      build-tooling:
        patterns: ["typescript", "wrangler"]
    commit-message:
      prefix: "deps"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(actions)"
